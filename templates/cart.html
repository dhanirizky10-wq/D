<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Keranjang Belanja</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Marketplace Makanan Lokal</h1>
        <nav>
            <a href="/">Beranda</a>
            <a href="/cart">Keranjang</a>
        </nav>
    </header>
    <main>
        <h2>Keranjang Belanja</h2>
        {% if cart %}
        <ul>
            {% for item in cart %}
            <li>{{ item.name }} - Rp {{ item.price }}</li>
            {% endfor %}
        </ul>
        <p>Total: Rp {{ total }}</p>
        <form action="/checkout" method="post">
            <button type="submit">Checkout</button>
        </form>
        {% else %}
        <p>Keranjang kosong.</p>
        {% endif %}
    </main>
</body>
</html>
